name: har

on:
  push:
    branches:
      - master
      - ohos-arm32
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

  workflow_dispatch:

concurrency:
  group: har-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-libs:
    name: ohos ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86-64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version
        shell: bash
        run: |
          ./new-release.sh

      - name: Get version
        shell: bash
        run: |
          SHERPA_ONNX_VERSION=$(grep "SHERPA_ONNX_VERSION" ./CMakeLists.txt | cut -d " " -f 2 | cut -d '"' -f 2)
          echo "SHERPA_ONNX_VERSION=$SHERPA_ONNX_VERSION" >> "$GITHUB_ENV"

      - name: Cache build result for ${{ matrix.arch }}
        id: cache-build-result
        uses: actions/cache@v4
        with:
          path: artifact
          key: sherpa-onnx-ohos-libs-${{ matrix.arch }}-${{ env.SHERPA_ONNX_VERSION }}-cache-v1

      - name: cache-toolchain
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: command-line-tools
          key: ohos-sdk-windows_linux-public-4.0.0

      - name: Download toolchain
        if: steps.cache-build-result.outputs.cache-hit != 'true' && steps.cache-toolchain.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # https://github.com/openharmony-rs/ohos-sdk/releases

          curl -L -O https://github.com/openharmony-rs/ohos-sdk/releases/download/v4.1/ohos-sdk-windows_linux-public.tar.gz.aa
          curl -L -O https://github.com/openharmony-rs/ohos-sdk/releases/download/v4.1/ohos-sdk-windows_linux-public.tar.gz.ab

          cat ohos-sdk-windows_linux-public.tar.gz.aa ohos-sdk-windows_linux-public.tar.gz.ab > ohos-sdk-windows_linux-public.tar.gz
          tar -xzf ohos-sdk-windows_linux-public.tar.gz
          rm ohos-sdk-windows_linux-public.tar.gz*

          cd ohos-sdk

          pushd linux/
          unzip native-linux-x64-4.1.7.5-Release.zip
          popd

          cd ..

          dst=command-line-tools/sdk/default/openharmony
          mkdir -p $dst

          mv ohos-sdk/linux/native $dst

          rm -rf ohos-sdk

          ls
          echo "---"
          ls -lh $dst/

      - name: Set environment variable
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "$GITHUB_WORKSPACE/command-line-tools/sdk/default/openharmony/native/build-tools/cmake/bin"  >> "$GITHUB_PATH"

      - name: Patch toolchain file
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          toolchain_file=$GITHUB_WORKSPACE/command-line-tools/sdk/default/openharmony/native/build/cmake/ohos.toolchain.cmake
          sed -i.bak 's/set(UNIX TRUE CACHE BOOL FROCE)/set(UNIX TRUE CACHE BOOL "Force UNIX" FORCE)/g' $toolchain_file

          sed -i.bak s/CMAKE_SYSTEM_NAME\ OHOS/CMAKE_SYSTEM_NAME\ Linux/g $toolchain_file
          sed -i.bak 's/set(CMAKE_C_FLAGS "${OHOS_C_COMPILER_FLAGS} ${CMAKE_C_FLAGS} -D__MUSL__")/set(CMAKE_C_FLAGS "${OHOS_C_COMPILER_FLAGS} ${CMAKE_C_FLAGS} -D__MUSL__ -D__OHOS__")/' $toolchain_file
          sed -i.bak 's/set(CMAKE_CXX_FLAGS "${OHOS_CXX_COMPILER_FLAGS} ${CMAKE_CXX_FLAGS} -D__MUSL__")/set(CMAKE_CXX_FLAGS "${OHOS_CXX_COMPILER_FLAGS} ${CMAKE_CXX_FLAGS} -D__MUSL__ -D__OHOS__")/' $toolchain_file

      - name: ccache
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: har-linux-${{ matrix.arch }}

      - name: Build libraries
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake --version

          export OHOS_SDK_NATIVE_DIR="$GITHUB_WORKSPACE/command-line-tools/sdk/default/openharmony/native"

          arch=${{ matrix.arch }}
          if [ $arch == arm64-v8a ]; then
            ./build-ohos-arm64-v8a.sh
          elif [ $arch == armeabi-v7a ]; then
            ./build-ohos-armeabi-v7a.sh
          elif [ $arch == x86-64 ]; then
            ./build-ohos-x86-64.sh
          fi

      - name: Collect libs
        if: steps.cache-build-result.outputs.cache-hit != 'true'
        shell: bash
        run: |
          arch=${{ matrix.arch }}
          if [ $arch == arm64-v8a ]; then
            build_dir=build-ohos-arm64-v8a
          elif [ $arch == armeabi-v7a ]; then
            build_dir=build-ohos-armeabi-v7a
          elif [ $arch == x86-64 ]; then
            build_dir=build-ohos-x86-64
          fi

          mkdir -p artifact
          cp -v $build_dir/install/lib/libsherpa-onnx-c-api.so artifact/
          cp -v $build_dir/install/lib/libonnxruntime.so artifact/

      - uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-ohos-libs-${{ matrix.arch }}
          path: ./artifact/

  build-har:
    name: Build Har
    needs: [build-libs]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version
        shell: bash
        run: |
          ./new-release.sh

      - name: cache-toolchain
        id: cache-toolchain-ohos
        uses: actions/cache@v4
        with:
          path: command-line-tools
          key: commandline-tools-linux-x64-5.0.3.906.zip

      - name: Download toolchain
        if: steps.cache-toolchain-ohos.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -SL -O https://huggingface.co/csukuangfj/harmonyos-commandline-tools/resolve/main/commandline-tools-linux-x64-5.0.3.906.zip
          unzip commandline-tools-linux-x64-5.0.3.906.zip
          rm commandline-tools-linux-x64-5.0.3.906.zip

      - name: Retrieve artifact (arm64-v8a)
        uses: actions/download-artifact@v4
        with:
          name: sherpa-onnx-ohos-libs-arm64-v8a
          path: ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/arm64-v8a

      - name: Retrieve artifact (armeabi-v7a)
        uses: actions/download-artifact@v4
        with:
          name: sherpa-onnx-ohos-libs-armeabi-v7a
          path: ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/armeabi-v7a

      - name: Retrieve artifact (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: sherpa-onnx-ohos-libs-x86-64
          path: ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/x86_64

      - name: Display libs
        shell: bash
        run: |
          echo "---arm64-v8a---"
          ls -lh ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/arm64-v8a/

          echo "---armeabi-v7a---"
          ls -lh ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/armeabi-v7a/

          echo "---x86_64---"
          ls -lh ./harmony-os/SherpaOnnxHar/sherpa_onnx/src/main/cpp/libs/x86_64/

      - name: Modify Build Profiles for OpenHarmony & Arm32
        shell: bash
        run: |
          python3 -c '
          import json
          import re

          def json5_to_json(text):
              # 移除单行和多行注释，处理末尾逗号
              text = re.sub(re.compile(r"//.*?\n" ), "", text)
              text = re.sub(re.compile(r"/\*.*?\*/", re.DOTALL), "", text)
              text = re.sub(r",(\s*[}\]])", r"\1", text)
              return text

          # 1. 修改根目录的 build-profile.json5，解锁 OpenHarmony 环境
          root_path = "harmony-os/SherpaOnnxHar/build-profile.json5"
          with open(root_path, "r", encoding="utf-8") as f:
              content = f.read()

          # 动态替换关键字段
          content = content.replace("\"compatibleSdkVersion\": \"4.0.0(10)\"", "\"compileSdkVersion\": 11, \"compatibleSdkVersion\": 11")
          content = content.replace("\"runtimeOS\": \"HarmonyOS\"", "\"runtimeOS\": \"OpenHarmony\"")

          with open(root_path, "w", encoding="utf-8") as f:
              f.write(content)
          print("Successfully patched root build-profile.json5")

          # 2. 修改模块内部的 build-profile.json5，加回 armeabi-v7a 过滤
          module_path = "harmony-os/SherpaOnnxHar/sherpa_onnx/build-profile.json5"
          with open(module_path, "r", encoding="utf-8") as f:
              m_content = f.read()

          # 在 abiFilters 中强行塞入 "armeabi-v7a"
          if "armeabi-v7a" not in m_content:
              m_content = m_content.replace("\"arm64-v8a\",", "\"arm64-v8a\",\n        \"armeabi-v7a\",")

          with open(module_path, "w", encoding="utf-8") as f:
              f.write(m_content)
          print("Successfully patched module build-profile.json5")
          '

          git diff .

      - name: Build Har
        shell: bash
        run: |
          export PATH="$GITHUB_WORKSPACE/command-line-tools/bin:$PATH"

          which hvigorw

          pushd harmony-os/SherpaOnnxHar

          # 打印修改后的配置快照，便于在 CI 日志中 Review 确认
          echo "=== Root Build Profile ==="
          cat build-profile.json5
          echo "=== Module Build Profile ==="
          cat sherpa_onnx/build-profile.json5
          echo "============================"

          cp -fv ../../LICENSE ./sherpa_onnx
          cp -fv ../../CHANGELOG.md ./sherpa_onnx

          # 执行自动化构建
          hvigorw --mode module -p product=default -p module=sherpa_onnx@default assembleHar --analyze=normal --parallel --incremental --no-daemon

          ls -lh ./sherpa_onnx/build/default/outputs/default/sherpa_onnx.har

          cp -v ./sherpa_onnx/build/default/outputs/default/sherpa_onnx.har $GITHUB_WORKSPACE


      - name: View Har
        shell: bash
        run: |
          file sherpa_onnx.har
          tar xvf sherpa_onnx.har

          cd package
          ls -lh

          ls -lh libs
          echo "---libs/x86_64---"
          ls -lh libs/x86_64

          echo "---libs/arm64-v8a---"
          ls -lh libs/arm64-v8a

          echo "---libs/armeabi-v7a---"
          ls -lh libs/armeabi-v7a

          echo "---src/main/ets/components---"
          ls -lh src/main/ets/components/

          echo "---src/main/cpp/types/libsherpa_onnx/---"
          ls -lh src/main/cpp/types/libsherpa_onnx/

          sudo apt-get install -y -q tree
          tree .

      - name: Collect result
        shell: bash
        run: |
          SHERPA_ONNX_VERSION=v$(grep "SHERPA_ONNX_VERSION" ./CMakeLists.txt  | cut -d " " -f 2  | cut -d '"' -f 2)
          echo "SHERPA_ONNX_VERSION=$SHERPA_ONNX_VERSION" >> "$GITHUB_ENV"

          mv sherpa_onnx.har sherpa_onnx-$SHERPA_ONNX_VERSION.har

      - uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-har
          path: ./sherpa_onnx*.har

      - name: Release har
        # if: false
        # if: github.repository_owner == 'csukuangfj' && github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          overwrite: true
          file: ./*.har
          repo_name: k2-fsa/sherpa-onnx
          repo_token: ${{ secrets.UPLOAD_GH_SHERPA_ONNX_TOKEN }}
          tag: v1.13.3

      - name: Release har
        if: github.repository_owner == 'k2-fsa' && github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          file_glob: true
          overwrite: true
          file: ./*.har

      - name: Publish to huggingface
        if: (github.repository_owner == 'csukuangfj' || github.repository_owner == 'k2-fsa') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 20
          timeout_seconds: 200
          shell: bash
          command: |
            git config --global user.email "csukuangfj@gmail.com"
            git config --global user.name "Fangjun Kuang"

            rm -rf huggingface
            export GIT_LFS_SKIP_SMUDGE=1
            export GIT_CLONE_PROTECTION_ACTIVE=false

            SHERPA_ONNX_VERSION=$(grep "SHERPA_ONNX_VERSION" ./CMakeLists.txt  | cut -d " " -f 2  | cut -d '"' -f 2)
            echo "SHERPA_ONNX_VERSION $SHERPA_ONNX_VERSION"

            git clone https://csukuangfj2:$HF_TOKEN@huggingface.co/csukuangfj2/sherpa-onnx-harmony-os huggingface
            cd huggingface
            git fetch
            git pull
            git merge -m "merge remote" --ff origin main

            d=har
            mkdir -p $d
            cp -v ../*.har $d/
            git status
            git lfs track "*.har"
            git add .
            git commit -m "add more hars"
            git push https://csukuangfj2:$HF_TOKEN@huggingface.co/csukuangfj2/sherpa-onnx-harmony-os main
